site_name: ICM Newark — Sistema de Inscrições
site_description: Guia de usuário e documentação do sistema de inscrições da Igreja Cristã Maranata Newark
site_author: ICM Newark
site_url: https://mcc-newark-hub.github.io/events-app/

repo_name: events-app
repo_url: https://github.com/mcc-newark-hub/events-app

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search:
      lang: pt

nav:
  - Início: index.md
  - Tutoriais:
    - Primeiro acesso: tutorials/first-login.md
    - Inscrever um membro: tutorials/register-member.md
  - Como fazer:
    - Redefinir PIN: how-to/reset-password.md
  - Referência:
    - Funções e perfis: reference/roles.md
    - Status de inscrição: reference/statuses.md
  - Explicação:
    - Ciclo de vida de um evento: explanation/event-lifecycle.md
  - Para desenvolvedores:
    - Modelo de dados: architecture/data-model.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mcc-newark-hub/events-app

